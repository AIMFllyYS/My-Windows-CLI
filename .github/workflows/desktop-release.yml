name: Desktop Release

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run desktop:install
      - run: npm run desktop:dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: desktop/release/**
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            desktop/release/*.exe
            desktop/release/*.zip
            desktop/release/*.blockmap
            desktop/release/latest*.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run desktop:install
      - run: npm run desktop:dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: desktop/release/**
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.blockmap
            desktop/release/latest*.yml
